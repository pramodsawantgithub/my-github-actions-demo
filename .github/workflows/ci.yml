name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    # Optional: force Node 24 now to remove warnings immediately
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6   # Node 24-compatible
        # If you prefer pinning, use a specific tag like v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6  # Node 24-compatible
        with:
          python-version: '3.10'       # keep quoted

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

name: Advanced CI/CD Pipeline

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

jobs:
  python-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Run Python checks
        uses: ./.github/actions/project-ci
        with:
          stack: python
          python-version: ${{ matrix.python-version }}
          run-lint: "true"
          run-security: "true"
          run-coverage: "true"

  node-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22", "24"]
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Run Node checks
        uses: ./.github/actions/project-ci
        with:
          stack: node
          node-version: ${{ matrix.node-version }}
          run-lint: "true"
          run-security: "true"
          run-coverage: "false"

  test-summary:
    if: always()
    needs: [python-checks, node-checks]
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.python-checks.result }}" == "failure" ] || [ "${{ needs.node-checks.result }}" == "failure" ]; then
            echo "❌ CI checks failed"
            exit 1
          fi
          echo "✅ All CI checks passed"

  dev:
    if: ${{ github.event_name == 'pull_request' }}
    needs: [python-checks, node-checks]
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Dev deployment gate
        run: echo "✅ Development job passed after Python and Node checks"

  prod:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
    needs: [python-checks, node-checks]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Prod deployment gate
        run: echo "✅ Production job passed after Python and Node checks"

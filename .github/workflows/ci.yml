name: Advanced CI/CD Pipeline

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop", "main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  python-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Run Python checks
        uses: ./.github/actions/project-ci
        with:
          stack: python
          python-version: ${{ matrix.python-version }}
          run-lint: "true"
          run-security: "true"
          run-coverage: "true"

  node-checks:
    runs-on: ubuntu-latest
    needs: [python-checks]
    strategy:
      matrix:
        node-version: ["20", "22", "24"]
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Run Node checks
        uses: ./.github/actions/project-ci
        with:
          stack: node
          node-version: ${{ matrix.node-version }}
          run-lint: "true"
          run-security: "true"
          run-coverage: "false"

  test-summary:
    if: always()
    needs: [python-checks, node-checks]
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.python-checks.result }}" == "failure" ] || [ "${{ needs.node-checks.result }}" == "failure" ]; then
            echo "❌ CI checks failed"
            exit 1
          fi
          echo "✅ All CI checks passed"

  dev:
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'develop' }}
    needs: [python-checks, node-checks]
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "🔐 AWS credentials configured for development environment"
          echo "Region: $AWS_REGION"
          # Credentials are now available for AWS CLI commands

      - name: Verify AWS identity
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: aws sts get-caller-identity

      - name: Dev deployment gate
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: echo "✅ Development job passed after Python and Node checks with AWS credentials"

  prod:
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' }}
    needs: [python-checks, node-checks]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "🔐 AWS credentials configured for production environment"
          echo "Region: $AWS_REGION"
          # Credentials are now available for AWS CLI commands

      - name: Verify AWS identity
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: aws sts get-caller-identity

      - name: Prod deployment gate
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: echo "✅ Production job passed after Python and Node checks with AWS credentials"

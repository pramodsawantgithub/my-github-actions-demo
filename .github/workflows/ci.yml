name: Advanced CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:     # Allows manual runs

jobs:

  # ---------------------------------------------------------
  # 1️⃣ CODE QUALITY JOB (Lint + Format)
  # ---------------------------------------------------------
  lint:
    runs-on: ubuntu-latest

    steps:
     
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black flake8

      - name: Run Ruff (fast linter)
        run: ruff check src/ tests/

      - name: Run Black (check only)
        run: black src/ tests/

      - name: Run Flake8
        run: flake8 src/ tests/



  # ---------------------------------------------------------
  # 2️⃣ BUILD JOB (Matrix for multiple Python versions)
  # ---------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install project
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt || true

      - name: Verify import (heredoc)
        run: |
          python - <<'PY'
          import sys
          print(sys.version)
          import my_github_actions_demo
          print('Import OK')
          PY

      # ⭐ FIX: Install build package
      - name: Install build tool
        run: pip install build

      - name: Build artifact (optional)
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.python-version }}
          path: dist/


  # ---------------------------------------------------------
  # 3️⃣ TEST JOB (with coverage)
  # ---------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install project and pytest + coverage
        run: |
          pip install -e .
          pip install pytest coverage

      - name: Run tests with coverage
        run: |
          coverage run -m pytest
          coverage xml
          coverage report

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  # ---------------------------------------------------------
  # 4️⃣ DEPLOY JOB (only when tests pass)
  # ---------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: test
   
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' # <-- deploy only from main and develop branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install project
        run: pip install -e .

      - name: Deploy Application
        run: |
          echo "🚀 Starting deployment..."
          # 🔥 ADD YOUR DEPLOYMENT COMMANDS BELOW:
          # Example AWS S3:
          # aws s3 sync dist/ s3://my-bucket --delete
          #
          # Example ECS:
          # aws ecs update-service --cluster myCluster --service myService --force-new-deployment
          #
          # Example Terraform:
          # terraform init
          # terraform apply -auto-approve
          #
          # Docker push:
          # docker build -t myapp .
          # docker push myapp
          
          echo "🎉 Deployment completed!"



name: CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:

  # -----------------------------
  # 1️⃣ BUILD JOB
  # -----------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install project and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt || echo "No requirements.txt found"

      - name: Verify build
        run: |
          python -c "import my_github_actions_demo; print('Build OK ✔')"


  # -----------------------------
  # 2️⃣ TEST JOB
  # -----------------------------
  test:
    runs-on: ubuntu-latest
    needs: build     # <-- ensures build runs first

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: pytest -q


  # -----------------------------
  # 3️⃣ DEPLOY JOB
  # -----------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: test      # <-- ensures deploy runs ONLY after test passes

  
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' # <-- deploy only from main and develop branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Deploy Application
        run: |
          echo "🚀 Deploying application..."
          # --------------------------------------
          # PLACE YOUR DEPLOY COMMANDS HERE
          # Examples:
          # aws s3 sync dist/ s3://my-bucket
          # aws ecs update-service ...
          # terraform init && terraform apply -auto-approve
          # docker build -t myimage .
          # docker push myimage
          # --------------------------------------

          echo "🎉 Deployment completed!"

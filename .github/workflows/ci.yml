name: CI Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6   # Node 24–compatible

      - name: Set up Python
        uses: actions/setup-python@v6  # Node 24–compatible
        with:
          python-version: '3.10'       # Keep quoted to avoid 3.1

      - name: Install dependencies
        run: |
          python -m pip install


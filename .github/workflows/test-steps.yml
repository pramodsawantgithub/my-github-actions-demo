name: Test Steps
on:
  workflow_dispatch

jobs:
  test-step:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Node dependencies
        run: npm ci

      - name: Run Node tests
        run: npm test

       

     

name: Test Steps
on:
  workflow_dispatch

jobs:
  test-step:
    runs-on: ubuntu-latest
    container:
      image: python:3.10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Verify Python
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest -q

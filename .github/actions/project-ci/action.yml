name: Project CI Checks
description: Reusable local action for Python and Node project checks

inputs:
  stack:
    description: Project stack to validate
    required: true
  python-version:
    description: Python version to use for Python checks
    required: false
    default: "3.10"
  node-version:
    description: Node.js version to use for Node checks
    required: false
    default: "24"

runs:
  using: composite
  steps:
    - name: Set up Python
      if: ${{ inputs.stack == 'python' }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Python dependencies
      if: ${{ inputs.stack == 'python' }}
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Run Python tests
      if: ${{ inputs.stack == 'python' }}
      shell: bash
      working-directory: ${{ github.workspace }}
      run: pytest

    - name: Set up Node
      if: ${{ inputs.stack == 'node' }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Node dependencies
      if: ${{ inputs.stack == 'node' }}
      shell: bash
      working-directory: ${{ github.workspace }}
      run: npm ci

    - name: Run Node script
      if: ${{ inputs.stack == 'node' }}
      shell: bash
      working-directory: ${{ github.workspace }}
      run: node index.js

    - name: Run Node tests
      if: ${{ inputs.stack == 'node' }}
      shell: bash
      working-directory: ${{ github.workspace }}
      run: npm test